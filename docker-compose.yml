version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-container

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: Root@123
      MYSQL_DATABASE: employee_db

    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend

    container_name: backend-container

    restart: always

    depends_on:
      - mysql

    ports:
      - "5000:5000"

    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: Root@123
      DB_NAME: employee_db

  frontend:
    build: ./frontend

    container_name: frontend-container

    restart: always

    depends_on:
      - backend

    ports:
      - "3000:3000"

volumes:
  mysql-data: